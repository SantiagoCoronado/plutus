name: plutus

# json-file rotation everywhere: the worker at -l info plus per-minute beat
# ticks generate constant output; unbounded logs eventually eat the disk
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-backend-env: &backend-env
  # Inside the compose network, db/redis hostnames replace the localhost values from .env
  DATABASE_URL: postgresql://plutus:${POSTGRES_PASSWORD:-plutus}@db:5432/plutus
  REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (openssl rand -hex 24)}@redis:6379/0
  # shared volume: the worker writes quantstats reports, the API serves them
  ARTIFACTS_DIR: /srv/artifacts
  # the claude-subscription provider's sidecar (see the agent-sidecar service).
  # The override exists for dev: point the backend at a natively-run sidecar
  # (e.g. http://host.docker.internal:8787) that uses the machine's Claude login.
  CLAUDE_SIDECAR_URL: ${CLAUDE_SIDECAR_URL_OVERRIDE:-http://agent-sidecar:8787}

services:
  db:
    # Community (TSL) image — the -oss variant lacks compression, never switch to it
    image: timescale/timescaledb:2.28.2-pg16
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: plutus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plutus}
      POSTGRES_DB: plutus
    ports:
      # host 5433 (5432 is commonly taken by other local stacks); in-network stays db:5432.
      # Loopback-only: nothing in this stack belongs on the LAN (spec phase 9 M1).
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plutus -d plutus"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8.0-alpine
    restart: unless-stopped
    logging: *default-logging
    # requirepass is mandatory: redis is the Celery broker — unauthenticated
    # access means arbitrary task execution. Password lives in .env.
    command: sh -c 'exec redis-server --requirepass "$$REDIS_PASSWORD"'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (openssl rand -hex 24)}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: ./backend
    restart: unless-stopped
    logging: *default-logging
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment: *backend-env
    ports:
      # host 8800 (8000 is commonly taken by other local stacks); in-container stays 8000
      - "127.0.0.1:8800:8000"
    volumes:
      - artifacts:/srv/artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: ./backend
    restart: unless-stopped
    logging: *default-logging
    command: celery -A worker.celery_app worker -l info --concurrency=2
    env_file: .env
    environment: *backend-env
    volumes:
      - artifacts:/srv/artifacts
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # a hung worker looks identical to a healthy one from outside — ask celery
      test: ["CMD-SHELL", "celery -A worker.celery_app inspect ping -d celery@$$(hostname) -t 10 | grep -q pong"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  beat:
    build: ./backend
    restart: unless-stopped
    logging: *default-logging
    command: celery -A worker.celery_app beat -l info --schedule /tmp/celerybeat-schedule
    env_file: .env
    environment: *backend-env
    depends_on:
      worker:
        condition: service_started
    healthcheck:
      # beat syncs its schedule file every ~3 min; a stale file means the
      # scheduler is wedged even though the process is alive
      test: ["CMD-SHELL", "[ -n \"$$(find /tmp -name 'celerybeat-schedule*' -mmin -15 2>/dev/null)\" ]"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  # live-quote streamer (Phase 7 M3): persistent Binance WS + poller fan-out over
  # Redis pub/sub. Not a Celery task — a long-running WS consumer doesn't fit beat.
  quotes:
    build: ./backend
    logging: *default-logging
    command: python -m app.quotes.streamer
    env_file: .env
    environment: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # the reconcile loop refreshes quotes:heartbeat (TTL 120s) every ~30s;
      # its absence means the streamer is wedged, whatever the process says
      test:
        - CMD
        - python
        - -c
        - "import sys; from app.providers.registry import _shared_redis; sys.exit(0 if _shared_redis().get('quotes:heartbeat') else 1)"
      interval: 30s
      timeout: 10s
      retries: 4
      start_period: 90s

  # nightly database backup sidecar (Phase 7 M7). Uses the SAME image as `db` so
  # pg_dump's version and TimescaleDB extension awareness match the server — a
  # requirement for the timescaledb_pre_restore()/post_restore() restore dance
  # (plain postgres would mismatch). The custom entrypoint replaces the postgres
  # server; `command: []` clears the image's default CMD ("postgres") so it is
  # never passed to the script as an argument.
  backup:
    image: timescale/timescaledb:2.28.2-pg16
    logging: *default-logging
    entrypoint: ["/bin/sh", "/backup.sh"]
    command: []
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-plutus}
      POSTGRES_USER: plutus
      POSTGRES_DB: plutus
      TZ: ${TZ:-America/Mexico_City}
      # optional rclone destination (e.g. "b2:plutus-backups"); unset = local only
      BACKUP_REMOTE: ${BACKUP_REMOTE:-}
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # claude-subscription LLM provider (spec §13.1): wraps the claude agent SDK on
  # the user's Claude plan. Deliberately NOT a dependency of anything — if it's
  # down, only the claude-subscription option in Settings degrades.
  # NEVER add ANTHROPIC_API_KEY to this environment (it would silently switch
  # billing from subscription to API; the server also deletes it defensively).
  agent-sidecar:
    build: ./sidecar
    restart: unless-stopped
    logging: *default-logging
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      PLUTUS_API_URL: http://app:8000
      PLUTUS_API_TOKEN: ${APP_AUTH_TOKEN}
      # fail-closed: the sidecar refuses to boot without this and 401s any
      # request that doesn't present it (it holds both tokens above)
      SIDECAR_SHARED_SECRET: ${SIDECAR_SHARED_SECRET:-}
      PORT: "8787"
    # No published port (spec phase 9 M1): only the app reaches it in-network.
    # For a natively-run backend, add a compose override publishing
    # "127.0.0.1:8787:8787" and set CLAUDE_SIDECAR_URL=http://localhost:8787.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5

  # production UI (spec phase 10 M5): built SPA behind nginx, proxying
  # /api + /health + /ws to app — one origin, no dev server, no CORS.
  # `npm run dev` on :5173 remains the dev flow.
  web:
    build: ./frontend
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  artifacts:
  backups:
