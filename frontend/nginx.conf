# Serves the built SPA and proxies the backend paths the app expects — the
# same shape the Vite dev proxy provides on :5173 (see vite.config.ts).
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: unknown paths fall through to index.html
    location / {
        try_files $uri /index.html;
    }

    # hashed bundle assets are immutable; index.html must revalidate
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location /api/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 600s;   # agent SSE streams are long-lived
        proxy_buffering off;       # stream SSE tokens as they arrive
    }

    location = /health {
        proxy_pass http://app:8000;
    }

    location /ws/ {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;  # quote websockets idle between heartbeats
    }
}
